<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Cuci Motor Cinematic</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --primary: #3b82f6;
            --success: #10b981;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-light: #f3f4f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Background gelap estetik untuk tema cinematic */
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: var(--text-light);
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        /* Navigasi Tab bergaya Glass */
        .tab-nav {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .tab-btn {
            flex: 1;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            color: #9ca3af;
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
        }

        /* Glassmorphism Card */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            display: none;
        }
        
        .card.active {
            display: block;
        }

        h2 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 25px;
            font-weight: 300;
            letter-spacing: 1px;
            color: #fff;
        }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 13px; color: #d1d5db; }
        
        input[type="text"], select, input[type="file"] { 
            width: 100%; 
            padding: 12px; 
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border); 
            border-radius: 8px; 
            box-sizing: border-box; 
            color: white;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }
        
        input[type="text"]:focus, select:focus {
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.4);
        }

        /* Styling option dropdown agar terbaca di tema gelap */
        select option { background: #203a43; color: white; }

        .checkbox-group { 
            background: rgba(0, 0, 0, 0.2); 
            padding: 15px; 
            border-radius: 8px; 
            border: 1px solid var(--glass-border); 
        }
        
        .checkbox-item { display: flex; align-items: center; }
        .checkbox-item input { margin-right: 10px; width: 18px; height: 18px; accent-color: var(--primary); }

        .total-box { 
            background: rgba(16, 185, 129, 0.1); 
            padding: 15px; 
            border-radius: 8px; 
            margin-top: 25px; 
            text-align: right; 
            border: 1px solid rgba(16, 185, 129, 0.3); 
        }
        
        .total-box span { font-size: 14px; color: #a7f3d0; }
        .total-box .price { font-size: 28px; font-weight: bold; color: #34d399; margin-top: 5px; text-shadow: 0 0 10px rgba(52, 211, 153, 0.3); }
        
        .btn-submit { 
            width: 100%; 
            padding: 14px; 
            background: linear-gradient(135deg, var(--success), #059669);
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 16px; 
            font-weight: bold; 
            margin-top: 20px; 
            cursor: pointer; 
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
            transition: 0.3s; 
        }
        
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(16, 185, 129, 0.6); }

        /* Area Upload Bukti TF */
        #transferArea {
            display: none;
            padding: 15px;
            background: rgba(59, 130, 246, 0.1);
            border: 1px dashed var(--primary);
            border-radius: 8px;
            margin-top: 10px;
        }

        /* Area Rekap */
        .recap-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .recap-box { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; border: 1px solid var(--glass-border); text-align: center; }
        .recap-box h4 { margin: 0 0 8px 0; color: #9ca3af; font-size: 13px; font-weight: 500; }
        .recap-box .amount { font-size: 22px; font-weight: bold; color: #60a5fa; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; color: #e5e7eb; }
        th, td { padding: 12px 10px; text-align: left; border-bottom: 1px solid var(--glass-border); }
        th { color: #9ca3af; font-weight: 500; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; }
        .empty-state { text-align: center; padding: 20px; color: #6b7280; font-style: italic; }
        .btn-clear { width: 100%; padding: 12px; background: rgba(239, 68, 68, 0.2); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.4); border-radius: 8px; margin-top: 20px; cursor: pointer; transition: 0.3s; }
        .btn-clear:hover { background: rgba(239, 68, 68, 0.4); color: white; }
    </style>
</head>
<body>

    <div class="container">
        <div class="tab-nav">
            <button class="tab-btn active" onclick="switchTab('kasir')">Area Kasir</button>
            <button class="tab-btn" onclick="switchTab('rekap')">Rekap Data</button>
        </div>

        <div id="kasir" class="card active">
            <h2>✨ Pesanan Baru</h2>
            <form id="orderForm">
                <div class="form-group">
                    <label>Nama Pelanggan</label>
                    <input type="text" id="customerName" placeholder="Masukkan nama" required>
                </div>
                
                <div class="form-group">
                    <label>Jenis Motor & Plat Nomor</label>
                    <div style="display: flex; gap: 10px;">
                        <select id="motorType" onchange="calculateTotal()" style="flex: 1;" required>
                            <option value="0" disabled selected>Pilih Ukuran</option>
                            <option value="15000">Kecil (Rp 15.000)</option>
                            <option value="20000">Besar (Rp 20.000)</option>
                        </select>
                        <input type="text" id="licensePlate" placeholder="Contoh: B 1234 ABC" style="flex: 1;" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Tipe Cuci</label>
                    <select id="washType" onchange="calculateTotal()">
                        <option value="0">Reguler Wash (+ Rp 0)</option>
                        <option value="25000">Premium Wash (+ Rp 25.000)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Menu Tambahan</label>
                    <div class="checkbox-group">
                        <div class="checkbox-item">
                            <input type="checkbox" id="addonCinematic" value="13000" onchange="calculateTotal()">
                            <label for="addonCinematic">Video Cinematic (+ Rp 13.000)</label>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Metode Pembayaran</label>
                    <select id="paymentMethod" onchange="handlePaymentMethod()">
                        <option value="cash">Tunai (Cash)</option>
                        <option value="transfer">Transfer Bank / QRIS (TF)</option>
                    </select>
                </div>

                <div id="transferArea">
                    <label>Unggah Foto Struk Transfer</label>
                    <input type="file" id="transferReceipt" accept="image/*">
                </div>

                <div class="total-box">
                    <span>Total Pembayaran:</span>
                    <div class="price" id="totalPriceDisplay">Rp 0</div>
                </div>

                <input type="hidden" id="rawTotalAmount" value="0">

                <button type="button" class="btn-submit" onclick="submitOrder()">Proses Pesanan</button>
            </form>
        </div>

        <div id="rekap" class="card">
            <h2>📊 Rekap Pemasukan</h2>
            
            <div class="recap-grid">
                <div class="recap-box">
                    <h4>7 Hari Terakhir</h4>
                    <div class="amount" id="recapWeekly">Rp 0</div>
                </div>
                <div class="recap-box">
                    <h4>Bulan Ini</h4>
                    <div class="amount" id="recapMonthly">Rp 0</div>
                </div>
            </div>

            <div style="overflow-x: auto; margin-top: 20px;">
                <table>
                    <thead>
                        <tr>
                            <th>Tanggal</th>
                            <th>Detail</th>
                            <th>Pembayaran</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody id="transactionTableBody">
                        </tbody>
                </table>
            </div>
            
            <button class="btn-clear" onclick="clearData()">Kosongkan Riwayat</button>
        </div>
    </div>

    <script>
        // Animasi Intro saat web dimuat
        gsap.from(".container", { opacity: 0, y: 30, duration: 1, ease: "power3.out" });

        // Fungsi Transisi Tab dengan Animasi GSAP
        function switchTab(tabId) {
            const currentActive = document.querySelector('.card.active');
            const newActive = document.getElementById(tabId);
            
            // Animasi keluar
            gsap.to(currentActive, {
                opacity: 0, 
                y: -10, 
                duration: 0.2, 
                onComplete: () => {
                    currentActive.classList.remove('active');
                    newActive.classList.add('active');
                    
                    // Animasi masuk
                    gsap.fromTo(newActive, 
                        { opacity: 0, y: 10 }, 
                        { opacity: 1, y: 0, duration: 0.3, ease: "power2.out" }
                    );
                }
            });

            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            if (tabId === 'rekap') generateRecap();
        }

        // Tampilkan/Sembunyikan Form Transfer
        function handlePaymentMethod() {
            const method = document.getElementById('paymentMethod').value;
            const tfArea = document.getElementById('transferArea');
            
            if (method === 'transfer') {
                tfArea.style.display = 'block';
                gsap.fromTo(tfArea, {opacity: 0, height: 0}, {opacity: 1, height: 'auto', duration: 0.3});
            } else {
                tfArea.style.display = 'none';
                document.getElementById('transferReceipt').value = ''; // Reset file input
            }
        }

        // Format Rupiah
        function formatRupiah(angka) {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);
        }

        // Kalkulasi Total
        function calculateTotal() {
            let motorTypePrice = parseInt(document.getElementById('motorType').value) || 0;
            let washTypePrice = parseInt(document.getElementById('washType').value) || 0;
            let addonCinematicPrice = document.getElementById('addonCinematic').checked ? parseInt(document.getElementById('addonCinematic').value) : 0;

            let total = motorTypePrice + washTypePrice + addonCinematicPrice;

            document.getElementById('rawTotalAmount').value = total;
            
            // Animasi pergantian harga
            const priceDisplay = document.getElementById('totalPriceDisplay');
            priceDisplay.innerText = formatRupiah(total);
            gsap.fromTo(priceDisplay, {scale: 1.2, color: "#fff"}, {scale: 1, color: "#34d399", duration: 0.3});
        }

        // Simpan Pesanan
        function submitOrder() {
            let name = document.getElementById('customerName').value;
            let plate = document.getElementById('licensePlate').value;
            let motorValue = document.getElementById('motorType').value;
            let paymentMethod = document.getElementById('paymentMethod').value;
            let totalAmount = parseInt(document.getElementById('rawTotalAmount').value);

            if (!name || !plate || motorValue === "0") {
                alert("Lengkapi Nama, Plat, dan Ukuran Motor!");
                return;
            }

            if (paymentMethod === 'transfer') {
                let receipt = document.getElementById('transferReceipt').files.length;
                if(receipt === 0) {
                    alert("Mohon unggah foto struk transfer terlebih dahulu!");
                    return;
                }
            }

            const transaction = {
                id: Date.now(),
                date: new Date().toISOString(),
                name: name,
                plate: plate,
                payment: paymentMethod.toUpperCase(),
                total: totalAmount
            };

            let db = JSON.parse(localStorage.getItem('wash_transactions_v2')) || [];
            db.push(transaction);
            localStorage.setItem('wash_transactions_v2', JSON.stringify(db));

            alert("Transaksi Sukses Disimpan!");
            
            document.getElementById('orderForm').reset();
            handlePaymentMethod();
            calculateTotal();
        }

        // Generate Rekap
        function generateRecap() {
            let db = JSON.parse(localStorage.getItem('wash_transactions_v2')) || [];
            let totalWeekly = 0, totalMonthly = 0, tableHTML = '';
            
            const now = new Date();
            const currentMonth = now.getMonth();
            const currentYear = now.getFullYear();
            const sevenDaysAgo = now.getTime() - (7 * 24 * 60 * 60 * 1000);

            db.reverse().forEach(trx => {
                const trxDate = new Date(trx.date);

                if (trxDate.getMonth() === currentMonth && trxDate.getFullYear() === currentYear) totalMonthly += trx.total;
                if (trxDate.getTime() >= sevenDaysAgo) totalWeekly += trx.total;

                const dateStr = trxDate.toLocaleDateString('id-ID', {day: '2-digit', month: 'short'});
                let paymentBadge = trx.payment === 'CASH' ? '<span style="color:#34d399">CASH</span>' : '<span style="color:#60a5fa">TF</span>';

                tableHTML += `
                    <tr>
                        <td>${dateStr}</td>
                        <td><strong>${trx.name}</strong><br><small style="color:#9ca3af">${trx.plate}</small></td>
                        <td>${paymentBadge}</td>
                        <td style="color:#a7f3d0">${formatRupiah(trx.total)}</td>
                    </tr>
                `;
            });

            document.getElementById('recapWeekly').innerText = formatRupiah(totalWeekly);
            document.getElementById('recapMonthly').innerText = formatRupiah(totalMonthly);
            
            if (db.length === 0) {
                document.getElementById('transactionTableBody').innerHTML = '<tr><td colspan="4" class="empty-state">Data masih kosong</td></tr>';
            } else {
                document.getElementById('transactionTableBody').innerHTML = tableHTML;
            }
        }

        // Hapus Data
        function clearData() {
            if (confirm("Yakin hapus semua data riwayat?")) {
                localStorage.removeItem('wash_transactions_v2');
                generateRecap();
            }
        }
    </script>
</body>
</html>
